<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Local Visibility Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0f19;
            --bg-card: #161f30;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --score-high: #10b981;
            --score-medium: #f59e0b;
            --score-low: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding: 3rem 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-val {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .stat-card.total .stat-val { color: var(--accent-blue); }
        .stat-card.hot .stat-val { color: #f87171; }
        .stat-card.warm .stat-val { color: #fbbf24; }
        .stat-card.medium .stat-val { color: #60a5fa; }

        .stat-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Controls Section */
        .controls-card {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .filter-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-purple);
            color: white;
            border-color: var(--accent-purple);
        }

        .sort-box select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }

        /* Leads Grid */
        .leads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .lead-card {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .lead-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .badge-hot { background-color: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-warm { background-color: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-medium { background-color: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }

        .priority-score {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--score-high);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .priority-score span {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .lead-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .lead-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 0.3rem;
        }

        .meta-item span:last-child {
            color: var(--text-main);
            font-weight: 500;
        }

        .lead-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: auto;
        }

        .btn {
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .btn-audit {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .btn-audit:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 18px rgba(139, 92, 246, 0.5);
        }

        .btn-pitch {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-pitch:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        @media (max-width: 768px) {
            body { padding: 2rem 1rem; }
            h1 { font-size: 2.2rem; }
            .controls-card { flex-direction: column; align-items: stretch; }
            .search-box { min-width: 100%; }
            .filter-buttons { overflow-x: auto; padding-bottom: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Apex Local Visibility Portal</h1>
            <p>Growth audits and search engine optimization reports prepared for top restaurants.</p>
        </header>

        <!-- Stats -->
        <section class="stats-grid">
            <div class="stat-card total">
                <div class="stat-val">2</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-card hot">
                <div class="stat-val">2</div>
                <div class="stat-label">🔥 Hot Leads</div>
            </div>
            <div class="stat-card warm">
                <div class="stat-val">0</div>
                <div class="stat-label">🟠 Warm Leads</div>
            </div>
            <div class="stat-card medium">
                <div class="stat-val">0</div>
                <div class="stat-label">🟡 Medium Leads</div>
            </div>
        </section>

        <!-- Controls -->
        <section class="controls-card">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search business name, category, or city...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="🔥 Hot Lead">🔥 Hot</button>
                <button class="filter-btn" data-filter="🟠 Warm Lead">🟠 Warm</button>
                <button class="filter-btn" data-filter="🟡 Medium Lead">🟡 Medium</button>
            </div>
            <div class="sort-box">
                <select id="sortSelect">
                    <option value="priority-desc">Priority: High to Low</option>
                    <option value="reviews-desc">Reviews: High to Low</option>
                    <option value="reviews-asc">Reviews: Low to High</option>
                    <option value="name-asc">Name: A to Z</option>
                </select>
            </div>
        </section>

        <!-- Leads Grid -->
        <main class="leads-grid" id="leadsGrid">
            <!-- Dynamically populated via JS -->
        </main>
    </div>

    <script>
        const leadsData = [
  {
    "name": "24/7 Restaurant - New Delhi",
    "city": "Delhi",
    "category": "Restaurant",
    "reviews": 82,
    "priority": 35,
    "type": "\ud83d\udd25 Hot Lead",
    "badge_class": "badge-hot",
    "url": "audits/audit_24_7_Restaurant_-_New_Delhi.html",
    "wa_link": "https://wa.me/918826892902?text=Hey%21%20Love%20the%20reviews%20at%2024/7%20Restaurant%20-%20New%20Delhi%E2%80%94a%204.6%20rating%20is%20awesome%21%20I%20was%20looking%20over%20Google%20Maps%20listings%20in%20Delhi%20and%20noticed%20one%20small%20adjustment%20that%20could%20bring%20you%20a%20lot%20more%20dine-in%20customers.%20I%20put%20together%20a%20quick%2C%20free%20visibility%20checklist%20for%20you%20here%3A%20https%3A//ayanshverma05.github.io/gmaps_restaurant_leads/audits/audit_24_7_Restaurant_-_New_Delhi.html.%20Hope%20it%20helps%21",
    "phone": "08826892902"
  },
  {
    "name": "Ye Old Bakery",
    "city": "Delhi",
    "category": "Bakery and Cake Shop",
    "reviews": 58,
    "priority": 15,
    "type": "\ud83d\udd25 Hot Lead",
    "badge_class": "badge-hot",
    "url": "audits/audit_Ye_Old_Bakery.html",
    "wa_link": "https://wa.me/911139555078?text=Hey%21%20Love%20the%20reviews%20at%20Ye%20Old%20Bakery%E2%80%94a%204.6%20rating%20is%20awesome%21%20I%20was%20looking%20over%20Google%20Maps%20listings%20in%20Delhi%20and%20noticed%20one%20small%20adjustment%20that%20could%20bring%20you%20a%20lot%20more%20dine-in%20customers.%20I%20put%20together%20a%20quick%2C%20free%20visibility%20checklist%20for%20you%20here%3A%20https%3A//ayanshverma05.github.io/gmaps_restaurant_leads/audits/audit_Ye_Old_Bakery.html.%20Hope%20it%20helps%21",
    "phone": "01139555078"
  }
];

        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const sortSelect = document.getElementById('sortSelect');
        const leadsGrid = document.getElementById('leadsGrid');

        let activeFilter = 'all';
        let searchQuery = '';
        let activeSort = 'priority-desc';

        function renderLeads() {
            // Filter
            let filtered = leadsData.filter(lead => {
                const matchesFilter = activeFilter === 'all' || lead.type === activeFilter;
                const matchesSearch = lead.name.toLowerCase().includes(searchQuery) ||
                                      lead.city.toLowerCase().includes(searchQuery) ||
                                      lead.category.toLowerCase().includes(searchQuery);
                return matchesFilter && matchesSearch;
            });

            // Sort
            filtered.sort((a, b) => {
                if (activeSort === 'priority-desc') return b.priority - a.priority;
                if (activeSort === 'reviews-desc') return b.reviews - a.reviews;
                if (activeSort === 'reviews-asc') return a.reviews - b.reviews;
                if (activeSort === 'name-asc') return a.name.localeCompare(b.name);
                return 0;
            });

            // Render
            leadsGrid.innerHTML = filtered.map(lead => `
                <div class="lead-card">
                    <div>
                        <div class="lead-header">
                            <span class="badge ${lead.badge_class}">${lead.type}</span>
                            <div class="priority-score">${lead.priority}<span>score</span></div>
                        </div>
                        <div class="lead-name">${lead.name}</div>
                        <div class="lead-meta">
                            <div class="meta-item">
                                <span>City</span>
                                <span>${lead.city}</span>
                            </div>
                            <div class="meta-item">
                                <span>Category</span>
                                <span>${lead.category}</span>
                            </div>
                            <div class="meta-item">
                                <span>Google Reviews</span>
                                <span>${lead.reviews}</span>
                            </div>
                            <div class="meta-item">
                                <span>Phone</span>
                                <span>${lead.phone || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="lead-actions">
                        <a href="${lead.url}" class="btn btn-audit" target="_blank">View Audit</a>
                        <a href="${lead.wa_link}" class="btn btn-pitch" target="_blank">WhatsApp Pitch</a>
                    </div>
                </div>
            `).join('');
        }

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            renderLeads();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.getAttribute('data-filter');
                renderLeads();
            });
        });

        sortSelect.addEventListener('change', (e) => {
            activeSort = e.target.value;
            renderLeads();
        });

        // Initial render
        renderLeads();
    </script>
</body>
</html>
